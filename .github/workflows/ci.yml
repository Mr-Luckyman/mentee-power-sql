name: Java CI with Gradle

on:
  push:
    branches: [ main, feature/*, master ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Prepare
        run: chmod +x gradlew

      - name: Build without tests
        run: ./gradlew clean build -x test

      - name: Run tests
        run: ./gradlew test